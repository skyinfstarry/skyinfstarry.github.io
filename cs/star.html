<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 星星许愿罐 · 私人罐</title>
    <style>
        :root {
            --bg-start: #0a0a1a;
            --jar-glass: rgba(255, 255, 255, 0.08);
            --jar-border: rgba(255, 255, 255, 0.25);
            --gold: #ffd700;
            --danger: #ff7b7b;
            --cork-color: #d4a574;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(170deg, #0a0a1a 0%, #0d1025 15%, #111133 30%, #0f1835 50%, #0a0f28 70%, #060615 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.8;
            }
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 20px;
            width: 100%;
            max-width: 560px;
        }

        .title {
            font-size: 2rem;
            color: #ffe9b0;
            text-shadow: 0 0 30px rgba(255, 200, 100, 0.5);
            margin-bottom: 4px;
        }
        .subtitle {
            color: #a0a0c0;
            font-size: 0.9rem;
        }
        .device-id-display {
            font-size: 0.7rem;
            color: #6a6a8a;
            margin-top: 6px;
            cursor: pointer;
            word-break: break-all;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .desk-area {
            position: relative;
            width: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            padding-bottom: 30px;
            background: radial-gradient(ellipse at center, rgba(255, 215, 180, 0.08) 0%, transparent 70%);
            border-radius: 30px;
        }

        .jar-wrapper {
            position: relative;
            width: 220px;
            height: 320px;
            filter: drop-shadow(0 20px 40px rgba(180, 140, 80, 0.25));
            transition: transform 0.1s ease-out;
        }
        .jar-glow {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 200, 120, 0.25) 0%, transparent 70%);
            top: 60px;
            left: 30px;
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .jar {
            position: relative;
            width: 200px;
            height: 280px;
            margin: 0 auto;
        }
        .jar-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 230px;
            background: var(--jar-glass);
            border: 2.5px solid var(--jar-border);
            border-radius: 25px 25px 55px 55px;
            overflow: hidden;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.04), 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .jar-body::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 15px;
            width: 30px;
            height: 100px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 50%;
            transform: rotate(-5deg);
        }
        .jar-neck {
            position: absolute;
            bottom: 225px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            background: var(--jar-glass);
            border: 2.5px solid var(--jar-border);
            border-bottom: none;
            border-radius: 18px 18px 0 0;
            z-index: 3;
        }

        .jar-cork {
            position: absolute;
            width: 60px;
            height: 25px;
            background: linear-gradient(180deg, #e0b88a 0%, #c4956a 40%, #a87550 100%);
            border-radius: 8px 8px 4px 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            left: 50%;
            bottom: 245px;
            transform: translateX(-50%);
        }
        .jar-cork::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 15px;
            width: 30px;
            height: 1px;
            background: rgba(0, 0, 0, 0.15);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1), 0 -4px 0 rgba(255, 255, 255, 0.1);
        }
        .jar-cork.open {
            bottom: 25px;
            left: calc(100% + 15px);
            transform: translateX(0) rotate(15deg);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4), 3px 3px 0 rgba(0, 0, 0, 0.2);
        }
        .jar-cork.open::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 5px;
            width: 50px;
            height: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            transform: rotate(-5deg);
            z-index: -1;
        }

        .stars-zone {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 155px;
            height: 180px;
            z-index: 5;
            pointer-events: auto;
        }
        .star-item {
            position: absolute;
            cursor: pointer;
            z-index: var(--z);
            animation: starFloat var(--float-dur) ease-in-out infinite;
            animation-delay: var(--float-delay);
            filter: drop-shadow(0 0 6px var(--glow-color));
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .star-item.removing {
            opacity: 0;
            transform: scale(0.3);
            pointer-events: none;
            animation: none;
        }
        @keyframes starFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(4deg);
            }
        }

        .trash-bin {
            position: relative;
            width: 70px;
            height: 75px;
            cursor: pointer;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.4));
            transition: transform 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
            margin-bottom: 15px;
        }
        .trash-bin:hover {
            transform: scale(1.05);
        }
        .trash-body {
            width: 60px;
            height: 75px;
            background: rgba(80, 80, 100, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px 6px 18px 18px;
            overflow: hidden;
            backdrop-filter: blur(2px);
            position: relative;
        }
        .paper-ball {
            position: absolute;
            background: #e8e0c8;
            width: 14px;
            height: 12px;
            border-radius: 40% 60% 50% 45%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            transform: rotate(var(--rot));
            animation: paperFloat 2s ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes paperFloat {
            0%,
            100% {
                transform: rotate(var(--rot)) translateY(0);
            }
            50% {
                transform: rotate(var(--rot)) translateY(-3px);
            }
        }

        .flying-star {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            filter: drop-shadow(0 0 18px var(--glow-color)) brightness(1.5);
            transition: none;
        }

        .input-section {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message-input {
            width: 100%;
            min-height: 60px;
            padding: 14px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(20, 20, 45, 0.8);
            color: #e8e8f0;
            resize: none;
            outline: none;
        }
        .submit-btn {
            padding: 12px 28px;
            border-radius: 25px;
            border: 2px solid rgba(255, 200, 100, 0.4);
            background: rgba(255, 200, 100, 0.2);
            color: #ffe4b0;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            background: rgba(255, 200, 100, 0.35);
        }
        .submit-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-card {
            background: rgba(30, 30, 60, 0.95);
            padding: 28px;
            border-radius: 20px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-delete-btn {
            margin-top: 10px;
            padding: 10px 30px;
            border-radius: 20px;
            border: 1.5px solid #ff7b7b;
            background: rgba(255, 100, 100, 0.15);
            color: #ffb0b0;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(40, 40, 70, 0.95);
            color: #ffe9b0;
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 500px) {
            .jar-wrapper {
                width: 180px;
                height: 270px;
            }
            .jar-body {
                width: 150px;
                height: 190px;
            }
            .jar-neck {
                width: 70px;
                bottom: 185px;
            }
            .jar-cork {
                width: 55px;
                height: 22px;
                bottom: 200px;
            }
            .jar-cork.open {
                bottom: 20px;
                left: calc(100% + 10px);
            }
            .trash-bin {
                width: 60px;
                height: 65px;
            }
            .trash-body {
                width: 52px;
                height: 65px;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <div class="toast" id="toast"></div>

    <div class="main-container">
        <div class="title">✨ 星星许愿罐</div>
        <div class="subtitle">木塞轻放，星光入怀</div>
        <div class="device-id-display" id="deviceIdDisplay" title="点击复制设备号">
            设备：<span id="deviceIdText">识别中...</span>
        </div>

        <div class="desk-area">
            <div class="jar-wrapper" id="jarWrapper">
                <div class="jar-glow"></div>
                <div class="jar">
                    <div class="jar-cork" id="jarCork" title="点击打开/盖上罐子"></div>
                    <div class="jar-neck"></div>
                    <div class="jar-body">
                        <div class="stars-zone clickable" id="starsZone"></div>
                    </div>
                </div>
            </div>

            <div class="trash-bin" id="trashBin" title="被丢弃的星星在这里">
                <div class="trash-body" id="trashBody"></div>
            </div>
        </div>

        <div class="input-section">
            <div style="display:flex; gap:6px; align-items:center; justify-content:center;">
                <span style="color:#aaa;">颜色：</span>
                <span class="color-dot active" data-color="#ffd700" style="background:#ffd700; width:22px; height:22px; border-radius:50%; cursor:pointer;"></span>
                <span class="color-dot" data-color="#ffb8a0" style="background:#ffb8a0; width:22px; height:22px; border-radius:50%; cursor:pointer;"></span>
                <span class="color-dot" data-color="#a0d2ff" style="background:#a0d2ff; width:22px; height:22px; border-radius:50%; cursor:pointer;"></span>
                <span class="color-dot" data-color="#c4b5fd" style="background:#c4b5fd; width:22px; height:22px; border-radius:50%; cursor:pointer;"></span>
                <span class="color-dot" data-color="#a0f0d0" style="background:#a0f0d0; width:22px; height:22px; border-radius:50%; cursor:pointer;"></span>
                <span class="color-dot" data-color="#ffffff" style="background:#ffffff; width:22px; height:22px; border-radius:50%; cursor:pointer;"></span>
            </div>
            <textarea class="message-input" id="messageInput" placeholder="写下心愿..." maxlength="280" rows="2"></textarea>
            <button class="submit-btn" id="submitBtn">🌟 放入星星</button>
            <div style="text-align:center; color:#888; font-size:0.8rem;">✨ 你的罐子里有 <span id="starCount">0</span> 颗星星</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal-card">
            <div style="font-size:2rem;" id="modalStarIcon">⭐</div>
            <div id="modalMessage" style="margin:15px 0; padding:12px; background:rgba(255,255,255,0.05); border-radius:12px; color:#e0d8c0;"></div>
            <div style="font-size:0.75rem; color:#888;" id="modalMeta"></div>
            <button id="modalCloseBtn" style="margin-top:15px; padding:8px 25px; border-radius:20px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.3); color:#ccc;">✨ 放回去</button>
            <button class="modal-delete-btn" id="modalDeleteBtn">🗑️ 取出星星</button>
        </div>
    </div>

    <!-- 引入 Supabase SDK（若仅本地使用可删除此脚本） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        (function() {
            // ==================== 🔧 配置区域（必须修改） ====================
            const SUPABASE_URL = 'https://lviwlbdgetznxwcyucmw.supabase.co/';       // 例如：https://xxxxx.supabase.co
            const SUPABASE_ANON_KEY = 'sb_publishable_a3dMcrhndCgOmtnmsPD-TA_wXlhwb93'; // 以 "eyJ" 开头的长字符串
            const TABLE_NAME = 'star_messages';             // 数据库表名，可自定义

            // 检测是否配置了 Supabase（未配置时自动使用本地存储）
            const useSupabase = SUPABASE_URL !== 'YOUR_SUPABASE_URL' &&
                                SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY' &&
                                SUPABASE_URL && SUPABASE_ANON_KEY;

            let supabaseClient = null;
            if (useSupabase && window.supabase) {
                try {
                    // 创建 Supabase 客户端，并携带设备ID（用于 RLS 策略）
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                        global: {
                            headers: { 'x-device-id': '' } // 将在获取 deviceId 后动态更新
                        }
                    });
                    console.log('🌟 Supabase 已连接，使用云端存储');
                } catch (e) {
                    console.warn('Supabase 初始化失败，回退到本地存储:', e.message);
                }
            }
            if (!supabaseClient) {
                console.log('💾 使用本地存储模式（数据仅保存在当前浏览器）');
            }

            // ==================== DOM 元素 ====================
            const starsBg = document.getElementById('starsBg');
            const starsZone = document.getElementById('starsZone');
            const messageInput = document.getElementById('messageInput');
            const submitBtn = document.getElementById('submitBtn');
            const starCountEl = document.getElementById('starCount');
            const deviceIdText = document.getElementById('deviceIdText');
            const deviceIdDisplay = document.getElementById('deviceIdDisplay');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalMessage = document.getElementById('modalMessage');
            const modalMeta = document.getElementById('modalMeta');
            const modalStarIcon = document.getElementById('modalStarIcon');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const modalDeleteBtn = document.getElementById('modalDeleteBtn');
            const toastEl = document.getElementById('toast');
            const jarCork = document.getElementById('jarCork');
            const jarWrapper = document.getElementById('jarWrapper');
            const trashBin = document.getElementById('trashBin');
            const trashBody = document.getElementById('trashBody');

            // ==================== 状态 ====================
            let messages = [];               // 当前设备的所有星星
            let selectedColor = '#ffd700';
            let deviceId = '';
            let toastTimer = null;
            let currentViewingMessage = null;
            let isJarOpen = false;
            let isAnimating = false;        // 防止动画期间重复点击

            // ==================== 设备ID（私有化核心） ====================
            function getOrCreateDeviceId() {
                let stored = localStorage.getItem('starjar_device_id');
                if (stored && stored.length > 8) return stored;
                const fp = [
                    navigator.hardwareConcurrency || '',
                    screen.width + 'x' + screen.height,
                    navigator.language || '',
                    new Date().getTimezoneOffset()
                ].join('|');
                let hash = 0;
                for (let i = 0; i < fp.length; i++) {
                    hash = ((hash << 5) - hash) + fp.charCodeAt(i);
                    hash |= 0;
                }
                const id = 'star_' + Math.abs(hash).toString(16).slice(0, 8) + '_' + Date.now().toString(36);
                localStorage.setItem('starjar_device_id', id);
                return id;
            }
            deviceId = getOrCreateDeviceId();
            deviceIdText.textContent = deviceId;
            // 更新 Supabase 客户端的设备ID头（如果已初始化）
            if (supabaseClient) {
                // 重新创建客户端以应用新的 header（简便方法：直接修改 headers 对象可能不生效，故重建）
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    global: { headers: { 'x-device-id': deviceId } }
                });
            }

            deviceIdDisplay.addEventListener('click', () => {
                navigator.clipboard.writeText(deviceId).then(() => {
                    showToast('📋 设备号已复制！');
                }).catch(() => showToast('设备号: ' + deviceId));
            });

            // ==================== Toast 提示 ====================
            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                toastTimer = setTimeout(() => {
                    toastEl.classList.remove('show');
                    toastTimer = null;
                }, 2000);
            }

            // ==================== 星空背景 ====================
            function createStarBackground() {
                let html = '';
                for (let i = 0; i < 80; i++) {
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    const size = Math.random() * 2.5 + 0.8;
                    const dur = Math.random() * 4 + 2;
                    const delay = Math.random() * 5;
                    html += `<div class="star-particle" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--dur:${dur}s;--delay:${delay}s;"></div>`;
                }
                starsBg.innerHTML = html;
            }
            createStarBackground();

            // ==================== 垃圾桶纸团 ====================
            function createPaperBalls() {
                trashBody.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    const paper = document.createElement('div');
                    paper.className = 'paper-ball';
                    paper.style.left = (8 + Math.random() * 30) + 'px';
                    paper.style.top = (8 + Math.random() * 40) + 'px';
                    paper.style.setProperty('--rot', Math.random() * 360 + 'deg');
                    paper.style.setProperty('--delay', Math.random() * 2 + 's');
                    trashBody.appendChild(paper);
                }
            }
            createPaperBalls();

            // ==================== 星星 SVG ====================
            function createStarSVG(color, size) {
                const lighter = lightenColor(color, 30);
                return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <polygon points="50,5 61,38 97,38 68,58 79,92 50,71 21,92 32,58 3,38 39,38"
                    fill="${color}" stroke="${lighter}" stroke-width="2" />
                </svg>`;
            }
            function lightenColor(hex, p) {
                const num = parseInt(hex.slice(1), 16);
                const r = Math.min(255, (num >> 16) + p);
                const g = Math.min(255, ((num >> 8) & 0xff) + p);
                const b = Math.min(255, (num & 0xff) + p);
                return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
            }

            // ==================== 渲染罐中星星 ====================
            function renderStars() {
                starsZone.innerHTML = '';
                const count = messages.length;
                let display = messages;
                // 罐子最多显示35颗（超出部分随机选取）
                if (count > 35) {
                    display = [...messages].sort(() => Math.random() - 0.5).slice(0, 35);
                }
                display.forEach(msg => {
                    const size = 18 + Math.random() * 15;
                    const starEl = document.createElement('div');
                    starEl.className = 'star-item';
                    starEl.setAttribute('data-id', msg.id);
                    starEl.style.setProperty('--size', size + 'px');
                    starEl.style.setProperty('--glow-color', msg.color);
                    starEl.style.setProperty('--z', Math.floor(Math.random() * 20));
                    starEl.style.setProperty('--float-dur', (2 + Math.random() * 3) + 's');
                    starEl.style.setProperty('--float-delay', Math.random() * 3 + 's');
                    starEl.style.left = (10 + Math.random() * 130) + 'px';
                    starEl.style.top = (10 + Math.random() * 150) + 'px';
                    starEl.innerHTML = createStarSVG(msg.color, size);
                    starEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openStarMessage(msg);
                    });
                    starsZone.appendChild(starEl);
                });
                starCountEl.textContent = count;
                // 罐子提示
                if (count === 0) {
                    const emptyHint = document.createElement('div');
                    emptyHint.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.35);pointer-events:none;text-align:center;font-size:0.8rem;';
                    emptyHint.innerHTML = '罐子空空的<br>写下心愿放进来吧 ✨';
                    starsZone.appendChild(emptyHint);
                } else if (count > 35) {
                    const hint = document.createElement('div');
                    hint.style.cssText = 'position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.6rem;color:rgba(255,255,255,0.5);pointer-events:none;white-space:nowrap;';
                    hint.textContent = `...还有${count - 35}颗星星在闪烁`;
                    starsZone.appendChild(hint);
                }
            }

            // ==================== 弹窗逻辑 ====================
            function openStarMessage(msg) {
                currentViewingMessage = msg;
                modalStarIcon.textContent = '💌';
                modalMessage.textContent = msg.content;
                modalMeta.textContent = new Date(msg.created_at).toLocaleString();
                modalOverlay.style.display = 'flex';
            }
            function closeModal() {
                modalOverlay.style.display = 'none';
                currentViewingMessage = null;
            }
            modalCloseBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            // ==================== 盖子控制 ====================
            function openLid() {
                if (!isJarOpen) {
                    jarCork.classList.add('open');
                    isJarOpen = true;
                }
            }
            function closeLid() {
                if (isJarOpen) {
                    jarCork.classList.remove('open');
                    isJarOpen = false;
                }
            }
            jarCork.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isJarOpen) {
                    closeLid();
                    showToast('🪵 盖子盖好了');
                } else {
                    openLid();
                    showToast('🪵 盖子打开了');
                }
            });

            // ==================== 摇罐子 ====================
            jarWrapper.addEventListener('dblclick', () => {
                if (isAnimating) return;
                jarWrapper.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                jarWrapper.style.transform = 'rotate(-5deg)';
                setTimeout(() => { jarWrapper.style.transform = 'rotate(4deg)'; }, 150);
                setTimeout(() => { jarWrapper.style.transform = 'rotate(-2deg)'; }, 300);
                setTimeout(() => {
                    jarWrapper.style.transform = 'rotate(0)';
                    jarWrapper.style.transition = 'transform 0.1s ease-out';
                }, 450);
                renderStars();
                showToast('🎵 星星们换了位置~');
            });

            // ==================== 飞入动画 ====================
            function animateFlyIn(color, onComplete) {
                const btnRect = submitBtn.getBoundingClientRect();
                const jarRect = jarWrapper.getBoundingClientRect();
                const startX = btnRect.left + btnRect.width / 2;
                const startY = btnRect.top;
                const targetX = jarRect.left + jarRect.width / 2;
                const targetY = jarRect.top + jarRect.height * 0.15;

                const star = document.createElement('div');
                star.className = 'flying-star';
                star.style.left = startX + 'px';
                star.style.top = startY + 'px';
                star.style.width = '30px';
                star.style.height = '30px';
                star.style.setProperty('--glow-color', color);
                star.innerHTML = createStarSVG(color, 30);
                document.body.appendChild(star);

                requestAnimationFrame(() => {
                    star.style.transition = 'all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    star.style.transform = `translate(${targetX - startX}px, ${targetY - startY}px) scale(0.35) rotate(360deg)`;
                    star.style.opacity = '0.9';
                });

                setTimeout(() => {
                    star.style.opacity = '0';
                    setTimeout(() => {
                        star.remove();
                        if (onComplete) onComplete();
                    }, 300);
                }, 700);
            }

            // ==================== 飞出动画（先升到罐口，再弧线入垃圾桶） ====================
            function animateFlyOut(color, onComplete) {
                const jarRect = jarWrapper.getBoundingClientRect();
                const trashRect = trashBin.getBoundingClientRect();
                const startX = jarRect.left + jarRect.width / 2;
                const startY = jarRect.top + jarRect.height * 0.45;
                const midX = jarRect.left + jarRect.width / 2;
                const midY = jarRect.top + jarRect.height * 0.08;
                const endX = trashRect.left + trashRect.width / 2;
                const endY = trashRect.top + trashRect.height * 0.4;

                const star = document.createElement('div');
                star.className = 'flying-star';
                star.style.left = startX + 'px';
                star.style.top = startY + 'px';
                star.style.width = '28px';
                star.style.height = '28px';
                star.style.setProperty('--glow-color', color);
                star.innerHTML = createStarSVG(color, 28);
                document.body.appendChild(star);

                // 第一阶段：升起至罐口
                requestAnimationFrame(() => {
                    star.style.transition = 'all 0.3s ease-out';
                    star.style.transform = `translate(${midX - startX}px, ${midY - startY}px) scale(0.8) rotate(180deg)`;
                    star.style.opacity = '1';
                });

                // 第二阶段：飞向垃圾桶
                setTimeout(() => {
                    star.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                    star.style.transform = `translate(${endX - startX}px, ${endY - startY}px) scale(0.25) rotate(540deg)`;
                    star.style.opacity = '0.9';
                }, 300);

                // 结束清理
                setTimeout(() => {
                    star.style.opacity = '0';
                    setTimeout(() => {
                        star.remove();
                        if (onComplete) onComplete();
                    }, 200);
                }, 800);
            }

            // ==================== 数据加载（仅加载本设备星星） ====================
            async function loadMessages() {
                if (isAnimating) return;
                isAnimating = true;
                if (supabaseClient) {
                    try {
                        const { data, error } = await supabaseClient
                            .from(TABLE_NAME)
                            .select('*')
                            .eq('device_id', deviceId)   // 关键：只加载本设备的星星
                            .order('created_at', { ascending: false })
                            .limit(200);
                        if (!error && data) {
                            messages = data;
                        } else {
                            console.warn('云端加载失败:', error?.message);
                        }
                    } catch (e) {
                        console.warn('加载异常:', e);
                    }
                } else {
                    // 本地存储：过滤出本设备
                    const all = JSON.parse(localStorage.getItem('starjar_messages_all') || '[]');
                    messages = all.filter(m => m.device_id === deviceId);
                }
                renderStars();
                isAnimating = false;
            }

            // 本地存储保存（仅更新本设备数据）
            function saveToLocalStorage(newMessages) {
                const all = JSON.parse(localStorage.getItem('starjar_messages_all') || '[]');
                const others = all.filter(m => m.device_id !== deviceId);
                const updated = [...others, ...newMessages];
                localStorage.setItem('starjar_messages_all', JSON.stringify(updated));
            }

            // ==================== 放入星星 ====================
            async function submitMessage() {
                if (isAnimating) {
                    showToast('🕊️ 上颗星星还在飞行中...');
                    return;
                }
                const content = messageInput.value.trim();
                if (!content) {
                    showToast('💭 先写点什么吧~');
                    messageInput.focus();
                    return;
                }

                openLid();
                submitBtn.disabled = true;
                isAnimating = true;

                const newMsg = {
                    id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
                    device_id: deviceId,
                    content: content,
                    color: selectedColor,
                    created_at: new Date().toISOString()
                };

                messageInput.value = '';
                messageInput.style.height = 'auto';

                // 播放飞入动画，动画结束后再更新数据
                animateFlyIn(selectedColor, async () => {
                    if (supabaseClient) {
                        try {
                            const { data, error } = await supabaseClient
                                .from(TABLE_NAME)
                                .insert([{
                                    device_id: newMsg.device_id,
                                    content: newMsg.content,
                                    color: newMsg.color
                                }])
                                .select()
                                .single();
                            if (!error && data) {
                                newMsg.id = data.id;
                                newMsg.created_at = data.created_at;
                            }
                        } catch (e) {}
                    }
                    // 加入本地数组并重绘
                    messages.unshift(newMsg);
                    if (!supabaseClient) {
                        const all = JSON.parse(localStorage.getItem('starjar_messages_all') || '[]');
                        all.push(newMsg);
                        localStorage.setItem('starjar_messages_all', JSON.stringify(all));
                    }
                    renderStars();
                    submitBtn.disabled = false;
                    isAnimating = false;
                    showToast('🌟 星星落入了你的罐子');
                    // 2秒后自动盖上木塞
                    setTimeout(() => {
                        if (isJarOpen) closeLid();
                    }, 2000);
                });
            }

            // ==================== 取出星星 ====================
            modalDeleteBtn.addEventListener('click', () => {
                if (!currentViewingMessage) return;
                if (isAnimating) {
                    showToast('🕊️ 动画进行中，请稍后...');
                    return;
                }
                if (!confirm('确定要取出这颗星星吗？\n\n它将飞入垃圾桶，无法恢复。')) return;

                const msg = currentViewingMessage;
                // 立即从列表中移除（罐中瞬间消失）
                messages = messages.filter(m => m.id !== msg.id);
                renderStars();
                closeModal();
                openLid();
                isAnimating = true;

                // 然后播放飞出动画
                animateFlyOut(msg.color, async () => {
                    // 动画结束后才真正删除数据库/本地记录
                    if (supabaseClient) {
                        await supabaseClient
                            .from(TABLE_NAME)
                            .delete()
                            .eq('id', msg.id)
                            .eq('device_id', deviceId);   // 双重保险
                    }
                    if (!supabaseClient) {
                        const all = JSON.parse(localStorage.getItem('starjar_messages_all') || '[]');
                        const updated = all.filter(m => m.id !== msg.id);
                        localStorage.setItem('starjar_messages_all', JSON.stringify(updated));
                    }
                    isAnimating = false;
                    showToast('💨 星星飞入了垃圾桶');
                    setTimeout(() => {
                        if (isJarOpen) closeLid();
                    }, 1500);
                });
            });

            // ==================== 事件绑定 ====================
            submitBtn.addEventListener('click', submitMessage);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitMessage();
                }
            });
            messageInput.addEventListener('input', () => {
                messageInput.style.height = 'auto';
                messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
            });

            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.addEventListener('click', function() {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    this.classList.add('active');
                    selectedColor = this.dataset.color;
                });
            });

            // ==================== 初始化 ====================
            loadMessages().then(() => {
                // 定期刷新（仅云端模式）
                if (supabaseClient) {
                    setInterval(() => {
                        if (!isAnimating && document.hidden === false) {
                            loadMessages();
                        }
                    }, 30000);
                }
            });
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && supabaseClient && !isAnimating) {
                    loadMessages();
                }
            });
            window.addEventListener('resize', () => {
                clearTimeout(window._resizeTimer);
                window._resizeTimer = setTimeout(renderStars, 200);
            });

            // 初始关闭木塞
            closeLid();

            console.log('🌟 私人星星许愿罐已就绪！');
            console.log('   - 设备ID:', deviceId);
            console.log('   - 存储模式:', supabaseClient ? '云端(Supabase)' : '本地(localStorage)');
            console.log('   - 罐中星星:', messages.length, '颗');
        })();
    </script>
</body>
</html>

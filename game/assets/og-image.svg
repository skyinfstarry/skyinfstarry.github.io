<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c87ff"/>
      <stop offset="50%" stop-color="#b06bff"/>
      <stop offset="100%" stop-color="#ff7eb3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#7c87ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c87ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="80" y="220" fill="#e6e8ee" font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif" font-size="64" font-weight="700">🎮 Games Hub</text>
  <text x="80" y="340" fill="url(#grad)" font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif" font-size="92" font-weight="800">140+ playable games.</text>
  <text x="80" y="430" fill="#e6e8ee" font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif" font-size="64" font-weight="700">One repo. Zero installs.</text>
  <text x="80" y="540" fill="#9aa2b4" font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif" font-size="32" font-weight="500">Built with Phaser, Three.js &amp; vanilla JS · MIT licensed</text>
</svg>

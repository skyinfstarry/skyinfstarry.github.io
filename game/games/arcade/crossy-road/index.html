<!DOCTYPE html>
<html lang="en">

<head>
  <title>Talha - Crossy Road Game Clone</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <link rel="stylesheet" href="style.css" />


</head>

<body>
  <div id="counter">0/200</div>

  <div id="controlls">
    <div>
      <button id="forward">
        <svg width="30" height="30" viewBox="0 0 10 10">
          <g transform="rotate(0, 5,5)">
            <path d="M5,4 L7,6 L3,6 L5,4" />
          </g>
        </svg>
      </button>
      <button id="left">
        <svg width="30" height="30" viewBox="0 0 10 10">
          <g transform="rotate(-90, 5,5)">
            <path d="M5,4 L7,6 L3,6 L5,4" />
          </g>
        </svg>
      </button>
      <button id="backward">
        <svg width="30" height="30" viewBox="0 0 10 10">
          <g transform="rotate(180, 5,5)">
            <path d="M5,4 L7,6 L3,6 L5,4" />
          </g>
        </svg>
      </button>
      <button id="right">
        <svg width="30" height="30" viewBox="0 0 10 10">
          <g transform="rotate(90, 5,5)">
            <path d="M5,4 L7,6 L3,6 L5,4" />
          </g>
        </svg>
      </button>
    </div>
  </div>

  <div id="howToPlay">
    <div class="msg">Tap to play — dodge traffic and keep moving!</div>
  </div>

  <style>
    #howToPlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      color: white;
      font-size: 32px;
      font-family: sans-serif;
      text-align: center;
    }

    #howToPlay .msg {
      padding: 20px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
    }
  </style>

  <script>   const payload = JSON.stringify({ type: "orientation", value: "portrait" });

    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(payload);
    } else if (window.parent) {
      window.parent.postMessage(payload, "*");
    }</script>


  <div id="end">
    <div class="end-panel">
      <div id="end-message">Game Over</div>
      <div class="end-buttons">
        <button id="retry">Replay</button>
        <button id="next">Next</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/99/three.min.js"></script>
  <script src="script.js"></script>
</body>

</html>

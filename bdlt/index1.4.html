    function formatTime(isoString) {
        if (!isoString) return '刚刚';
        const date = new Date(isoString);
        const now = new Date();
        const diff = (now - date) / 1000;
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 604800) return Math.floor(diff / 86400) + '天前';
        return date.toLocaleDateString('zh-CN');
    }

    async function generateUUIDv5(name) {
        const namespace = new Uint8Array([
            0x6b, 0xa7, 0xb8, 0x10, 0x9d, 0xad, 0x11, 0xd1,
            0x80, 0xb4, 0x00, 0xc0, 0x4f, 0xd4, 0x30, 0xc8
        ]);
        const encoder = new TextEncoder();
        const data = new Uint8Array(namespace.length + encoder.encode(name).length);
        data.set(namespace);
        data.set(encoder.encode(name), namespace.length);
        const hash = await crypto.subtle.digest('SHA-1', data);
        const bytes = new Uint8Array(hash);
        bytes[6] = (bytes[6] & 0x0f) | 0x50;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20,32)}`;
    }

                .maybeSingle();
            if (error) {
                console.error('获取用户信息失败:', error);
                return null;
            }
            return data;
        } catch (err) {
            console.error('获取用户信息异常:', err);
            return null;
        }
    }
    async function saveUserProfile(authId, name) {
        try {
            const { data: existing, error: selectError } = await supabaseClient
                .from('users')
                .select('id')
                .eq('auth_id', authId)
                .maybeSingle();
            if (selectError) {
                console.error('查询用户失败:', selectError);
                return false;
            }
            if (existing) {
                const { error: updateError } = await supabaseClient
                    .from('users')
                    .update({ name: name.trim() })
                    .eq('auth_id', authId);
                if (updateError) {
                    console.error('更新用户失败:', updateError);
                    return false;
                }
            } else {
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert({ auth_id: authId, name: name.trim() });
                if (insertError) {
                    console.error('插入用户失败:', insertError);
                    return false;
                }
            }
            return true;
        } catch (err) {
            console.error('保存用户信息异常:', err);
            return false;
        }
    }
    function showNameModal() {
        nameModal.classList.remove('hidden');
        nameInput.value = '';
        nameError.textContent = '';
        nameInput.focus();
        return new Promise((resolve) => {
            const handler = async () => {
                const val = nameInput.value.trim();
                if (!val) {
                    nameError.textContent = '请输入一个昵称～';
                    return;
                }
                if (val.length > 20) {
                    nameError.textContent = '昵称不能超过20个字符';
                    return;
                }
                confirmNameBtn.disabled = true;
                nameError.textContent = '保存中…';
                const ok = await saveUserProfile(currentUser.id, val);

                if (ok) {

                    currentUser.name = val;
                    updateUserUI();

                        alert('昵称保存成功！但请注意，由于您使用了隐私模式，关闭页面后您的身份将丢失，已发表的评论将无法删除。');
                    }
                    resolve(val);
                } else {
                    nameError.textContent = '保存失败，请重试（查看控制台错误）';
                }

    // ================================================================
    //  私信功能
    // ================================================================
    async function getContacts() {
        if (!currentUser) return [];
        const { data, error } = await supabaseClient
            .from('messages')
            .select('from_user_id, to_user_id')
            .or(`from_user_id.eq.${currentUser.id},to_user_id.eq.${currentUser.id}`);
        if (error) {
            console.error('获取联系人失败:', error);
            return [];
        }
        const ids = new Set();
        data.forEach(msg => {
            if (msg.from_user_id !== currentUser.id) ids.add(msg.from_user_id);
            if (msg.to_user_id !== currentUser.id) ids.add(msg.to_user_id);
        });
        tempContacts.forEach(c => ids.add(c.auth_id));
        const idArray = Array.from(ids);
        if (idArray.length === 0) return [];
        const { data: users, error: userError } = await supabaseClient
            .from('users')
            .select('auth_id, name')
            .in('auth_id', idArray);
        if (userError) {
            console.error('获取联系人信息失败:', userError);
            return idArray.map(id => ({ auth_id: id, name: id.slice(0,8)+'...' }));
        }
        const userMap = {};
        users.forEach(u => { userMap[u.auth_id] = u.name; });
        const contacts = idArray.map(id => ({
            auth_id: id,
            name: userMap[id] || id.slice(0,8)+'...'+id.slice(-4)
        }));
        contacts.sort((a,b) => a.name.localeCompare(b.name));
        return contacts;
    }

    async function renderContactList() {
        const contacts = await getContacts();
        if (!contacts.length) {
            contactList.innerHTML = `<div class="empty-state" style="padding:20px;">暂无联系人</div>`;
            return;
        }
        let html = '';
        for (const c of contacts) {
            const initial = getAvatarLetter(c.name);
            html += `
                <div class="contact-item" data-uuid="${c.auth_id}">
                    <div class="contact-avatar">${initial}</div>
                    <div class="contact-name">${escapeHtml(c.name)}</div>
                </div>
            `;
        }
        contactList.innerHTML = html;
        contactList.querySelectorAll('.contact-item').forEach(el => {
            el.addEventListener('click', () => {
                const uuid = el.dataset.uuid;
                openChatWith(uuid);
            });
        });
        if (currentContactId) {
            const active = contactList.querySelector(`.contact-item[data-uuid="${currentContactId}"]`);
            if (active) {
                active.classList.add('active');
                openChatWith(currentContactId);
            } else {
                currentContactId = null;
                chatTargetName.textContent = '选择联系人';
                chatTargetUuid.textContent = 'UUID: —';
                chatMessages.innerHTML = `<div class="empty-state" style="padding:20px;">选择联系人开始聊天</div>`;
                msgInputArea.style.display = 'none';

            const first = contactList.querySelector('.contact-item');
            if (first) first.click();
        }
    }

    async function openChatWith(uuid) {
        if (!currentUser) return;
        currentContactId = uuid;
        contactList.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        const activeItem = contactList.querySelector(`.contact-item[data-uuid="${uuid}"]`);
        if (activeItem) activeItem.classList.add('active');

        const { data: userData, error } = await supabaseClient
            .from('users')
            .select('name')
            .eq('auth_id', uuid)
            .maybeSingle();
        let displayName = uuid.slice(0,8)+'...'+uuid.slice(-4);
        if (userData && userData.name) displayName = userData.name;
        chatTargetName.textContent = displayName;
        chatTargetUuid.textContent = `UUID: ${uuid}`;
        chatTargetUuid.title = `点击复制完整UUID: ${uuid}`;
        chatTargetUuid.onclick = () => {
            navigator.clipboard.writeText(uuid).then(() => {
                chatTargetUuid.textContent = '✅ 已复制!';
                setTimeout(() => chatTargetUuid.textContent = `UUID: ${uuid}`, 2000);
            }).catch(() => alert('复制失败，请手动复制: ' + uuid));
        };

        await loadChatMessages(uuid);
        msgInputArea.style.display = 'flex';
        msgInputText.value = '';
        msgInputText.focus();
    }

    async function loadChatMessages(otherId) {
        if (!currentUser) return;
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${otherId}),and(from_user_id.eq.${otherId},to_user_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true });
        if (error) {
            console.error('加载消息失败:', error);
            chatMessages.innerHTML = `<div class="empty-state">加载失败</div>`;
            return;
        }
        if (!data.length) {
            chatMessages.innerHTML = `<div class="empty-state" style="padding:20px;">暂无消息，发送一条吧</div>`;
            return;
        }
        let html = '';
        for (const msg of data) {
            const isSent = msg.from_user_id === currentUser.id;
            html += `
                <div class="msg-item ${isSent ? 'sent' : 'received'}">
                    ${escapeHtml(msg.content)}
                    <div class="msg-time">${formatTime(msg.created_at)}</div>
                </div>
            `;
        }
        chatMessages.innerHTML = html;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
        const content = msgInputText.value.trim();
        if (!content || !currentContactId) return;
        try {
            const { error } = await supabaseClient
                .from('messages')
                .insert({
                    from_user_id: currentUser.id,
                    to_user_id: currentContactId,
                    content: content
                });
            if (error) throw error;
            msgInputText.value = '';
            await loadChatMessages(currentContactId);
        } catch (err) {
            console.error('发送失败:', err);
            alert('发送失败：' + err.message);
        }
    }

    async function addContact() {
        const input = addContactInput.value.trim();
        if (!input) return;
        if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(input)) {
            alert('请输入正确的UUID格式');
            return;
        }
        const contacts = await getContacts();
        if (contacts.some(c => c.auth_id === input)) {
            alert('该联系人已存在');
            return;
        }
        const { data, error } = await supabaseClient
            .from('users')
            .select('name')
            .eq('auth_id', input)
            .maybeSingle();
        if (error || !data) {
            alert('该用户不存在');
            return;
        }
        const name = data.name || input.slice(0,8)+'...';
        tempContacts.push({ auth_id: input, name: name });
        await renderContactList();
        openChatWith(input);
        addContactInput.value = '';
    }

    function subscribeMessages() {
        if (messagesSubscription) {
            supabaseClient.removeChannel(messagesSubscription);
        }
        const channel = supabaseClient
            .channel('messages_channel')
            .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'messages',
                filter: `or(to_user_id.eq.${currentUser.id},from_user_id.eq.${currentUser.id})`
            }, () => {
                if (currentContactId) {
                    loadChatMessages(currentContactId);
                }
                renderContactList();
            })
            .subscribe();
        messagesSubscription = channel;
    }

    // ================================================================
    //  加载病毒数据（从 viruses.json）
    // ================================================================
    async function loadVirusesFromGitHub() {
        try {
            const basePath = window.location.pathname.replace(/\/[^/]*$/, '');
            const jsonUrl = `${window.location.origin}${basePath}/viruses.json`;
            console.log('正在加载病毒数据:', jsonUrl);
            const response = await fetch(jsonUrl);
            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error(`viruses.json 未找到，请在 ${BASE_PATH} 目录下创建该文件。`);
                }
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            const data = await response.json();
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('viruses.json 格式不正确或为空，请检查。');
            }
            const viruses = [];
            for (const item of data) {
                if (!item.name) continue;
                const virusId = await generateUUIDv5(item.name);
                viruses.push({
                    id: virusId,
                    name: item.name,
                    description: item.description || '暂无简介',
                    download_url: item.download_url || '#'
                });
            }
            return viruses;
        } catch (err) {
            console.error('加载病毒数据失败:', err);
            throw err;
        }
    }

    // ================================================================
    //  渲染病毒卡片 & 评论绑定（改进：预加载评论计数）
    // ================================================================
    async function renderViruses() {
        if (!allViruses.length) {
            virusGrid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <div class="icon">🦠</div>
                    <p>没有找到病毒，请确保 viruses.json 文件存在且内容正确。</p>
                </div>
            `;
            return;
        }

        // 1. 批量获取所有病毒的评论数量
        const virusIds = allViruses.map(v => v.id);
        let commentCounts = {};
        if (virusIds.length > 0) {
            try {
                const { data, error } = await supabaseClient
                    .from('comments')
                    .select('virus_id', { count: 'exact', head: true })
                    .in('virus_id', virusIds)
                    .group('virus_id');
                // 注意：count 在 group 下不能直接用，改用分别查询或使用聚合函数
                // 更可靠的方式：分别查询每个病毒，但为了性能，使用 group by 和 count
                // Supabase 不支持直接 group by 并返回 count，但可以使用 rpc 或多次查询。
                // 为了简单，采用循环查询每个病毒（如果病毒数量不多，可以接受）
                // 或者使用一个 raw 查询：select virus_id, count(*) from comments where virus_id = any(...) group by virus_id
                // 这里改用更简单的方法：逐个查询（如果病毒数量小于 20 可以接受）
                // 但为了效率，使用 in 和 group by 通过 PostgreSQL 函数，但 Supabase JS 客户端不直接支持。
                // 改用手动循环，因为论坛病毒数量一般不多。
                // 我们改为在循环中单独查询，但会引入异步延迟，但在渲染前一次性加载所有计数。
                // 更好的方式：使用 Supabase 的 rpc 或直接使用 `select` 语句加 `group`。
                // 但我们利用 Supabase 的 `select` 配合 `count` 和 `group` 的变通：使用 `select('virus_id, count()')` 但需要聚合。
                // 实际可以使用 `from('comments').select('virus_id, count()', { count: 'exact' }).group('virus_id')` 但 JS 客户端不支持 group。
                // 稳妥起见，我循环查询每个病毒，但并行执行。
                const promises = allViruses.map(async (virus) => {
                    const { count, error } = await supabaseClient
                        .from('comments')
                        .select('*', { count: 'exact', head: true })
                        .eq('virus_id', virus.id);
                    if (!error) {
                        commentCounts[virus.id] = count;
                    } else {
                        commentCounts[virus.id] = 0;
                    }
                });
                await Promise.all(promises);
            } catch (e) {
                console.warn('获取评论计数失败，将显示为0', e);
                commentCounts = {};
            }
        }

        // 2. 生成 HTML
        let html = '';
        for (const virus of allViruses) {
            const count = commentCounts[virus.id] || 0;
            html += `
                <div class="virus-card" data-virus-id="${virus.id}">
                    <div class="virus-name">
                        ${escapeHtml(virus.name)}
                        <span class="badge">#${virus.id.slice(0,6)}</span>
                    </div>
                    <div class="virus-desc">${escapeHtml(virus.description)}</div>
                    <div class="virus-actions">
                        <a href="${virus.download_url}" target="_blank" class="btn-download" rel="noopener">⬇ 下载</a>
                        <button class="btn-comment-toggle" data-virus-id="${virus.id}">
                            💬 评论 <span class="comment-count" id="count-${virus.id}">${count}</span>
                        </button>
                    </div>
                    <div class="comment-section" id="comments-${virus.id}">
                        <div class="comment-list" id="commentList-${virus.id}">
                            <div class="empty-state" style="padding:16px 0;font-size:14px;">
                                <span class="text-muted">暂无评论，快来抢沙发！</span>
                            </div>
                        </div>
                        <div class="comment-input-area">
                            <textarea placeholder="写下你的评论…" id="commentInput-${virus.id}" rows="1"></textarea>
                            <button class="btn-submit-comment" data-virus-id="${virus.id}">发布</button>
                        </div>
                    </div>
                </div>
            `;
        }
        virusGrid.innerHTML = html;

        // 3. 绑定事件（与之前相同）
        $$('.btn-comment-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const vid = btn.dataset.virusId;
                const section = document.getElementById(`comments-${vid}`);
                if (!section) return;
                const isOpen = section.classList.toggle('open');
                btn.textContent = isOpen ? '💬 收起' : `💬 评论 `;
                const countSpan = document.getElementById(`count-${vid}`);
                if (countSpan) btn.appendChild(countSpan);
                if (isOpen) {
                    loadCommentsForVirus(vid);
                } else {
                    if (commentSubscriptions[vid]) {
                        commentSubscriptions[vid]();
                        delete commentSubscriptions[vid];
                    }
                }
            });
        });
        $$('.btn-submit-comment').forEach(btn => {
            btn.addEventListener('click', async () => {
                const vid = btn.dataset.virusId;
                const textarea = document.getElementById(`commentInput-${vid}`);
                if (!textarea) return;
                const content = textarea.value.trim();
                if (!content) { textarea.focus(); return; }
                await submitComment(vid, content);
                textarea.value = '';
            });
        });
        $$('.comment-input-area textarea').forEach(ta => {
            ta.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    const vid = ta.id.replace('commentInput-', '');
                    const btn = document.querySelector(`.btn-submit-comment[data-virus-id="${vid}"]`);
                    if (btn) btn.click();
                }
            });
            ta.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        });
    }

    // ================================================================
    //  评论系统（refreshCommentList 会更新计数）
    // ================================================================
    async function submitComment(virusId, content) {
        if (!currentUser || !currentUser.id || !currentUser.name) {
            alert('请先设置昵称再评论');
            return;
        }
        try {
            const { error } = await supabaseClient
                .from('comments')
                .insert({
                    virus_id: virusId,
                    user_id: currentUser.id,
                    user_name: currentUser.name,
                    content: content.trim()
                });
            if (error) throw error;
        } catch (e) {
            console.error('发表评论失败', e);
            alert('评论发送失败，请重试');
        }
    }
    function loadCommentsForVirus(virusId) {
        if (commentSubscriptions[virusId]) {
            commentSubscriptions[virusId]();
            delete commentSubscriptions[virusId];
        }
        const subscription = supabaseClient
            .channel(`comments_${virusId}`)
            .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'comments',
                filter: `virus_id=eq.${virusId}`
            }, () => {
                refreshCommentList(virusId);
            })
            .subscribe();
        commentSubscriptions[virusId] = () => {
            supabaseClient.removeChannel(subscription);
        };
        refreshCommentList(virusId);
    }
    async function refreshCommentList(virusId) {
        const list = document.getElementById(`commentList-${virusId}`);
        if (!list) return;
        const { data, error } = await supabaseClient
            .from('comments')
            .select('*')
            .eq('virus_id', virusId)
            .order('created_at', { ascending: true });
        if (error) {
            console.error('获取评论失败', error);
            return;
        }
        const countSpan = document.getElementById(`count-${virusId}`);
        if (countSpan) {
            countSpan.textContent = data.length;
            const parentBtn = document.querySelector(`.btn-comment-toggle[data-virus-id="${virusId}"]`);
            if (parentBtn) {
                const isOpen = document.getElementById(`comments-${virusId}`)?.classList.contains('open');
                parentBtn.innerHTML = isOpen ? `💬 收起 <span class="comment-count" id="count-${virusId}">${data.length}</span>` :
                    `💬 评论 <span class="comment-count" id="count-${virusId}">${data.length}</span>`;
            }
        }
        if (!data.length) {
            list.innerHTML = `<div class="empty-state" style="padding:16px 0;font-size:14px;">
                    <span class="text-muted">暂无评论，快来抢沙发！</span>
                </div>`;
            return;
        }
        let html = '';
        for (const c of data) {
            const isMine = c.user_id === currentUser?.id;
            html += `
                <div class="comment-item" data-comment-id="${c.id}">
                    <div class="comment-body">
                        <div class="comment-author">
                            ${escapeHtml(c.user_name)}
                            <span class="time">${formatTime(c.created_at)}</span>
                            ${isMine ? '<span style="font-weight:400;color:#7a8fa8;font-size:12px;margin-left:6px;">· 我</span>' : ''}
                        </div>
                        <div class="comment-content">${escapeHtml(c.content)}</div>
                    </div>
                    <button class="comment-delete-btn ${isMine ? 'visible' : ''}" 
                            data-comment-id="${c.id}" 
                            data-virus-id="${virusId}"
                            ${!isMine ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}
                            title="${isMine ? '删除我的评论' : '只能删除自己的评论'}">
                        ✕
                    </button>
                </div>
            `;
        }
        list.innerHTML = html;
        list.querySelectorAll('.comment-delete-btn.visible').forEach(btn => {
            btn.addEventListener('click', async () => {
                const commentId = btn.dataset.commentId;
                if (!confirm('确定要删除这条评论吗？')) return;
                try {
                    const { error } = await supabaseClient
                        .from('comments')
                        .delete()
                        .eq('id', commentId);
                    if (error) throw error;
                } catch (err) {
                    console.error('删除评论失败', err);
                    alert('删除失败，请重试');
                }
            });
        });
    }

                    <ul style="text-align:left;max-width:400px;margin:16px auto;background:#f8fafd;padding:16px 24px;border-radius:12px;color:#1e2a3a;">
                        <li><code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code></li>
                        <li><code>GITHUB_OWNER</code> 和 <code>GITHUB_REPO</code></li>
                        <li><code>BASE_PATH</code>（部署子目录）</li>
                    </ul>
                    <p style="color:#8a9bb5;font-size:14px;">确保在指定目录下创建 <code>viruses.json</code> 文件。</p>
                    <hr style="border-color:#eee;margin:24px 0;" />
                    <p style="font-size:13px;color:#b0c0d8;">星星の病毒论坛 · 私信版</p>
                </div>
            `;
            return;
        }

        githubInfo.textContent = `数据源：静态JSON (${BASE_PATH}/viruses.json)`;

        let authId = null;
        if (storageAvailable) {
            try {
                const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
                if (sessionError) {
                    console.warn('获取会话失败，将重新登录:', sessionError);
                } else if (session && session.user) {
                    authId = session.user.id;
                    console.log('✅ 复用已有匿名会话，用户ID:', authId);
                }
            } catch (e) {
                console.warn('获取会话异常:', e);
            }
        }

        if (!authId) {
            const { data, error } = await supabaseClient.auth.signInAnonymously();
            if (error) {
                console.error('匿名登录失败', error);
                showLoading(false);
                virusGrid.innerHTML = `<div class="empty-state"><div class="icon">🚫</div><p>登录失败：${error.message}</p></div>`;
                return;
            }
            authId = data.user.id;
            console.log('✅ 新建匿名会话，用户ID:', authId);
        }

        const profile = await fetchUserProfile(authId);
        if (profile && profile.name) {
            currentUser = { id: authId, name: profile.name };
            updateUserUI();
        } else {
            currentUser = { id: authId, name: null };
            updateUserUI();
            showLoading(false);
            virusGrid.innerHTML = `<div class="empty-state"><div class="icon">🌟</div><p>请先设置你的昵称～</p></div>`;
            const name = await showNameModal();
            if (!name) return;
        }

        showLoading(true);
        try {
            allViruses = await loadVirusesFromGitHub();
            await renderViruses();
            showLoading(false);
        } catch (err) {
            showLoading(false);
            virusGrid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escapeHtml(err.message)}</p></div>`;
        }
    }

    initApp().catch(err => console.error('启动失败', err));

    // 事件绑定（私信）
    messageBtn.addEventListener('click', async () => {
        if (!currentUser) {
            alert('请先设置昵称');
            return;
        }
        messageModal.classList.remove('hidden');
        currentContactId = null;
        await renderContactList();
        subscribeMessages();
    });
    closeMsgModal.addEventListener('click', () => {
        messageModal.classList.add('hidden');
        if (messagesSubscription) {
            supabaseClient.removeChannel(messagesSubscription);
            messagesSubscription = null;
        }
    });
    messageModal.addEventListener('click', (e) => {
        if (e.target === messageModal) closeMsgModal.click();
    });
    sendMsgBtn.addEventListener('click', sendMessage);
    msgInputText.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    addContactBtn.addEventListener('click', addContact);
    addContactInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addContact();
    });

    nameModal.addEventListener('click', (e) => {
        if (e.target === nameModal) nameInput.focus();
    });
    uuidDisplay.addEventListener('click', () => {
        if (currentUser && currentUser.id) {
            navigator.clipboard.writeText(currentUser.id).then(() => {
                uuidDisplay.textContent = '✅ 已复制!';
                setTimeout(() => updateUserUI(), 2000);
            }).catch(() => {
                alert('复制失败，请手动复制: ' + currentUser.id);
            });
        }
    });

    console.log('⭐ 星星の病毒论坛 (私信版·评论计数预加载) 已启动！');
    console.log('📁 数据源:', `${BASE_PATH}/viruses.json`);
    console.log('🔒 localStorage 可用:', storageAvailable ? '是' : '否 (隐私模式)');
</script>
</body>
</html>

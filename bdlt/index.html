    // ================================================================
    //  工具函数
    // ================================================================
    function formatTime(isoString) {
        if (!isoString) return '刚刚';
        const date = new Date(isoString);
        const now = new Date();
        const diff = (now - date) / 1000;
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 604800) return Math.floor(diff / 86400) + '天前';
        return date.toLocaleDateString('zh-CN');
    }

    function getAvatarLetter(name) {
        if (!name) return '👤';
        return name.trim().charAt(0);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showLoading(show) {
        loadingMask.style.display = show ? 'block' : 'none';
        virusGridContainer.style.display = show ? 'none' : 'block';
    }

    // ---------- UUID v5 生成器（基于文件夹名） ----------
    async function generateUUIDv5(name) {
        const namespace = new Uint8Array([
            0x6b, 0xa7, 0xb8, 0x10, 0x9d, 0xad, 0x11, 0xd1,
            0x80, 0xb4, 0x00, 0xc0, 0x4f, 0xd4, 0x30, 0xc8
        ]);
        const encoder = new TextEncoder();
        const data = new Uint8Array(namespace.length + encoder.encode(name).length);
        data.set(namespace);
        data.set(encoder.encode(name), namespace.length);
        const hash = await crypto.subtle.digest('SHA-1', data);
        const bytes = new Uint8Array(hash);
        bytes[6] = (bytes[6] & 0x0f) | 0x50;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20,32)}`;
    }

    // ================================================================
    //  用户认证 & 名字管理
    // ================================================================
    async function fetchUserProfile(authId) {
        const { data, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('auth_id', authId)
            .maybeSingle();
        if (error) {
            console.error('获取用户信息失败', error);
            return null;
        }
        return data;
    }

    async function saveUserProfile(authId, name) {
        const { error } = await supabaseClient
            .from('users')
            .upsert({ auth_id: authId, name: name.trim() }, { onConflict: 'auth_id' });
        if (error) {
            console.error('保存用户信息失败', error);
            return false;
        }
        return true;
    }

    function showNameModal() {
        nameModal.classList.remove('hidden');
        nameInput.value = '';
        nameError.textContent = '';
        nameInput.focus();
        return new Promise((resolve) => {
            const handler = async () => {
                const val = nameInput.value.trim();
                if (!val) {
                    nameError.textContent = '请输入一个昵称～';
                    return;
                }
                if (val.length > 20) {
                    nameError.textContent = '昵称不能超过20个字符';
                    return;
                }
                confirmNameBtn.disabled = true;
                nameError.textContent = '保存中…';
                const ok = await saveUserProfile(currentUser.id, val);
                confirmNameBtn.disabled = false;
                if (ok) {
                    nameModal.classList.add('hidden');
                    currentUser.name = val;
                    updateUserUI();
                    resolve(val);
                } else {
                    nameError.textContent = '保存失败，请重试';
                }
            };
            confirmNameBtn.onclick = handler;
            nameInput.onkeydown = (e) => { if (e.key === 'Enter') handler(); };
        });
    }

    function updateUserUI() {
        if (currentUser && currentUser.name) {
            userDisplayName.textContent = currentUser.name;
            userAvatar.textContent = getAvatarLetter(currentUser.name);
        } else {
            userDisplayName.textContent = '未命名';
            userAvatar.textContent = '👤';
        }
    }

    // ================================================================
    //  从 GitHub 加载病毒数据（使用 BASE_PATH）
    // ================================================================
    async function loadVirusesFromGitHub() {
        try {
            // 构建 API 路径：如果 BASE_PATH 非空，则拼接到路径中
            const contentsPath = BASE_PATH ? `${BASE_PATH}/` : '';
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${contentsPath}`;
            const response = await fetch(url);
            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error(`路径 "${contentsPath}" 不存在，请检查 BASE_PATH 是否正确。`);
                }
                throw new Error(`GitHub API 错误: ${response.status}`);
            }
            const items = await response.json();
            // 只取文件夹，并过滤掉隐藏文件夹（以 . 开头）
            const folders = items.filter(item => 
                item.type === 'dir' && !item.name.startsWith('.')
            );
            if (folders.length === 0) {
                throw new Error('目录下没有找到任何病毒文件夹。请创建文件夹，例如 "彩虹猫"。');
            }

            const viruses = [];
            for (const folder of folders) {
                const folderName = folder.name;
                // 获取该文件夹内的文件列表
                const folderUrl = folder.url;
                const folderResp = await fetch(folderUrl);
                if (!folderResp.ok) continue;
                const folderItems = await folderResp.json();
                // 查找 jj.txt 和 lj.txt
                const jjFile = folderItems.find(f => f.name === 'jj.txt');
                const ljFile = folderItems.find(f => f.name === 'lj.txt');
                let description = '暂无简介';
                let downloadUrl = '#';
                if (jjFile) {
                    const contentResp = await fetch(jjFile.download_url);
                    if (contentResp.ok) {
                        description = await contentResp.text();
                    }
                }
                if (ljFile) {
                    const contentResp = await fetch(ljFile.download_url);
                    if (contentResp.ok) {
                        downloadUrl = (await contentResp.text()).trim();
                    }
                }
                const virusId = await generateUUIDv5(folderName);
                viruses.push({
                    id: virusId,
                    name: folderName,
                    description: description.trim(),
                    download_url: downloadUrl,
                });
            }
            return viruses;
        } catch (err) {
            console.error('加载病毒数据失败:', err);
            throw err;
        }
    }

    // ================================================================
    //  渲染病毒卡片 & 评论绑定
    // ================================================================

        if (!allViruses.length) {
            virusGrid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">

                    <p>没有找到病毒，请确保目录下有病毒文件夹。</p>

            return;

        let html = '';
        for (const virus of allViruses) {
            html += `
                <div class="virus-card" data-virus-id="${virus.id}">

                        ${escapeHtml(virus.name)}

                    <div class="virus-desc">${escapeHtml(virus.description)}</div>

                        <a href="${virus.download_url}" target="_blank" class="btn-download" rel="noopener">⬇ 下载</a>
                        <button class="btn-comment-toggle" data-virus-id="${virus.id}">
                            💬 评论 <span class="comment-count" id="count-${virus.id}">0</span>

                    </div>
                    <div class="comment-section" id="comments-${virus.id}">

                                <span class="text-muted">暂无评论，快来抢沙发！</span>

                        </div>
                        <div class="comment-input-area">
                            <textarea placeholder="写下你的评论…" id="commentInput-${virus.id}" rows="1"></textarea>
                            <button class="btn-submit-comment" data-virus-id="${virus.id}">发布</button>
                        </div>
                    </div>
                </div>
            `;
        }
        virusGrid.innerHTML = html;

        // 评论展开/收起
        $$('.btn-comment-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const vid = btn.dataset.virusId;
                const section = document.getElementById(`comments-${vid}`);
                if (!section) return;
                const isOpen = section.classList.toggle('open');
                btn.textContent = isOpen ? '💬 收起' : `💬 评论 `;
                const countSpan = document.getElementById(`count-${vid}`);
                if (countSpan) btn.appendChild(countSpan);
                if (isOpen) {
                    loadCommentsForVirus(vid);
                } else {
                    if (commentSubscriptions[vid]) {
                        commentSubscriptions[vid]();
                        delete commentSubscriptions[vid];
                    }
                }
            });
        });

        // 提交评论
        $$('.btn-submit-comment').forEach(btn => {
            btn.addEventListener('click', async () => {
                const vid = btn.dataset.virusId;
                const textarea = document.getElementById(`commentInput-${vid}`);
                if (!textarea) return;
                const content = textarea.value.trim();
                if (!content) { textarea.focus(); return; }
                await submitComment(vid, content);
                textarea.value = '';
            });
        });

        // Ctrl+Enter 快捷提交
        $$('.comment-input-area textarea').forEach(ta => {
            ta.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    const vid = ta.id.replace('commentInput-', '');
                    const btn = document.querySelector(`.btn-submit-comment[data-virus-id="${vid}"]`);
                    if (btn) btn.click();
                }
            });
            ta.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        });
    }

    // ================================================================
    //  评论系统
    // ================================================================
    async function submitComment(virusId, content) {
        if (!currentUser || !currentUser.id || !currentUser.name) {
            alert('请先设置昵称再评论');
            return;
        }
        try {
            const { error } = await supabaseClient
                .from('comments')
                .insert({
                    virus_id: virusId,
                    user_id: currentUser.id,
                    user_name: currentUser.name,
                    content: content.trim()
                });
            if (error) throw error;
        } catch (e) {
            console.error('发表评论失败', e);
            alert('评论发送失败，请重试');
        }
    }

    function loadCommentsForVirus(virusId) {
        if (commentSubscriptions[virusId]) {
            commentSubscriptions[virusId]();
            delete commentSubscriptions[virusId];
        }

        const subscription = supabaseClient
            .channel(`comments_${virusId}`)
            .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'comments',
                filter: `virus_id=eq.${virusId}`
            }, () => {
                refreshCommentList(virusId);
            })
            .subscribe();

        commentSubscriptions[virusId] = () => {
            supabaseClient.removeChannel(subscription);
        };

        refreshCommentList(virusId);
    }

    async function refreshCommentList(virusId) {
        const list = document.getElementById(`commentList-${virusId}`);
        if (!list) return;

        const { data, error } = await supabaseClient
            .from('comments')
            .select('*')
            .eq('virus_id', virusId)
            .order('created_at', { ascending: true });

        if (error) {
            console.error('获取评论失败', error);
            return;
        }

        const countSpan = document.getElementById(`count-${virusId}`);
        if (countSpan) {
            countSpan.textContent = data.length;
            const parentBtn = document.querySelector(`.btn-comment-toggle[data-virus-id="${virusId}"]`);
            if (parentBtn) {
                const isOpen = document.getElementById(`comments-${virusId}`)?.classList.contains('open');
                parentBtn.innerHTML = isOpen ? `💬 收起 <span class="comment-count" id="count-${virusId}">${data.length}</span>` :
                    `💬 评论 <span class="comment-count" id="count-${virusId}">${data.length}</span>`;
            }
        }

        if (!data.length) {
            list.innerHTML = `<div class="empty-state" style="padding:16px 0;font-size:14px;">
                    <span class="text-muted">暂无评论，快来抢沙发！</span>
                </div>`;
            return;
        }

        let html = '';
        for (const c of data) {
            const isMine = c.user_id === currentUser?.id;
            html += `
                <div class="comment-item" data-comment-id="${c.id}">
                    <div class="comment-body">
                        <div class="comment-author">
                            ${escapeHtml(c.user_name)}
                            <span class="time">${formatTime(c.created_at)}</span>
                            ${isMine ? '<span style="font-weight:400;color:#7a8fa8;font-size:12px;margin-left:6px;">· 我</span>' : ''}
                        </div>
                        <div class="comment-content">${escapeHtml(c.content)}</div>
                    </div>
                    <button class="comment-delete-btn ${isMine ? 'visible' : ''}" 
                            data-comment-id="${c.id}" 
                            data-virus-id="${virusId}"
                            ${!isMine ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}
                            title="${isMine ? '删除我的评论' : '只能删除自己的评论'}">
                        ✕
                    </button>
                </div>
            `;
        }
        list.innerHTML = html;

        list.querySelectorAll('.comment-delete-btn.visible').forEach(btn => {
            btn.addEventListener('click', async () => {
                const commentId = btn.dataset.commentId;
                if (!confirm('确定要删除这条评论吗？')) return;
                try {
                    const { error } = await supabaseClient
                        .from('comments')
                        .delete()
                        .eq('id', commentId);
                    if (error) throw error;
                } catch (err) {
                    console.error('删除评论失败', err);
                    alert('删除失败，请重试');
                }
            });
        });
    }

    // ================================================================
    //  刷新（重新从 GitHub 加载）
    // ================================================================
    refreshBtn.addEventListener('click', async () => {
        showLoading(true);
        try {
            allViruses = await loadVirusesFromGitHub();
            renderViruses();
            // 重新加载已展开的评论
            $$('.comment-section.open').forEach(section => {
                const vid = section.id.replace('comments-', '');
                if (commentSubscriptions[vid]) {
                    commentSubscriptions[vid]();
                    delete commentSubscriptions[vid];
                }
                loadCommentsForVirus(vid);
            });
        } catch (err) {
            alert('刷新失败：' + err.message);
        } finally {
            showLoading(false);
        }
    });

    // ================================================================
    //  启动应用
    // ================================================================
    async function initApp() {
        // 检查配置
        if (SUPABASE_ANON_KEY === '你的 anon public key' || GITHUB_OWNER === '你的GitHub用户名') {
            document.body.innerHTML = `
                <div style="max-width:700px;margin:60px auto;padding:40px;background:#fff;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,0.08);text-align:center;font-family:sans-serif;">
                    <h2 style="color:#c0394b;">⚠️ 请先配置</h2>
                    <p style="color:#4a5f7a;line-height:1.7;">在 HTML 代码开头的 <code>配置区域</code> 中修改：</p>
                    <ul style="text-align:left;max-width:400px;margin:16px auto;background:#f8fafd;padding:16px 24px;border-radius:12px;color:#1e2a3a;">
                        <li><code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code></li>
                        <li><code>GITHUB_OWNER</code> 和 <code>GITHUB_REPO</code></li>
                        <li><code>BASE_PATH</code>（部署子目录）</li>
                    </ul>
                    <p style="color:#8a9bb5;font-size:14px;">确保在指定目录下创建病毒文件夹，内含 <code>jj.txt</code> 和 <code>lj.txt</code>。</p>
                    <hr style="border-color:#eee;margin:24px 0;" />
                    <p style="font-size:13px;color:#b0c0d8;">星星の病毒论坛 · 文件管理版</p>
                </div>
            `;
            return;
        }

        githubInfo.textContent = `数据源：${GITHUB_OWNER}/${GITHUB_REPO}/${BASE_PATH || '根目录'}`;

        // 匿名登录
        const { data, error } = await supabaseClient.auth.signInAnonymously();
        if (error) {
            console.error('匿名登录失败', error);
            showLoading(false);
            virusGrid.innerHTML = `<div class="empty-state"><div class="icon">🚫</div><p>登录失败，请检查 Supabase 配置</p></div>`;
            return;
        }

        const authId = data.user.id;
        const profile = await fetchUserProfile(authId);
        if (profile && profile.name) {
            currentUser = { id: authId, name: profile.name };
            updateUserUI();
        } else {
            currentUser = { id: authId, name: null };
            updateUserUI();
            showLoading(false);
            virusGrid.innerHTML = `<div class="empty-state"><div class="icon">🌟</div><p>请先设置你的昵称～</p></div>`;
            const name = await showNameModal();
            if (!name) return;
        }

        // 加载病毒数据
        showLoading(true);
        try {
            allViruses = await loadVirusesFromGitHub();
            renderViruses();
            showLoading(false);
        } catch (err) {
            showLoading(false);
            virusGrid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escapeHtml(err.message)}</p></div>`;
        }
    }

    initApp().catch(err => console.error('启动失败', err));

    nameModal.addEventListener('click', (e) => {
        if (e.target === nameModal) nameInput.focus();
    });

    console.log('⭐ 星星の病毒论坛 (文件管理·子目录版) 已启动！');
    console.log('📁 病毒数据源:', `${GITHUB_OWNER}/${GITHUB_REPO}/${BASE_PATH || '根目录'}`);
    console.log('📄 每个病毒文件夹内需包含 jj.txt（简介）和 lj.txt（下载链接）');
</script>
</body>
</html>
